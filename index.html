<!--
-- Run in Supabase SQL editor:
create table profiles (
  id uuid references auth.users primary key,
  name text, school text, address text, whatsapp text,
  initials text, color int default 152,
  rating float default 5.0, sales int default 0, balance float default 0,
  created_at timestamptz default now()
);
create table books (
  id uuid default gen_random_uuid() primary key,
  title text not null, author text default '',
  subject text, year text, school text,
  condition text default 'bom', price float default 0,
  delivery text default 'combinado',
  photo_url text default '',
  seller_id uuid references profiles(id),
  status text default 'active',
  faved_count int default 0,
  created_at timestamptz default now()
);
create table chats (
  id uuid default gen_random_uuid() primary key,
  book_id uuid references books(id),
  buyer_id uuid references profiles(id),
  seller_id uuid references profiles(id),
  created_at timestamptz default now()
);
create table messages (
  id uuid default gen_random_uuid() primary key,
  chat_id uuid references chats(id),
  sender_id uuid references profiles(id),
  text text, created_at timestamptz default now()
);
create table orders (
  id uuid default gen_random_uuid() primary key,
  book_id uuid references books(id),
  buyer_id uuid references profiles(id),
  seller_id uuid references profiles(id),
  status text default 'payment_confirmed',
  buyer_confirmed_delivery boolean default false,
  seller_confirmed_delivery boolean default false,
  created_at timestamptz default now()
);

-- (repeat for books, chats, messages, orders)
-->

function calcFees(price){
  const totalFee = price * FEE_RATE;
  const halfFee = totalFee / 2;
  const buyerPays = price + halfFee;
  const sellerReceives = price - halfFee;
  return {totalFee, halfFee, buyerPays, sellerReceives};
}

function Toast({msg,onDone}){
  React.useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'absolute',top:60,left:'50%',transform:'translateX(-50%)',zIndex:999,background:'rgba(0,0,0,0.82)',color:'#fff',padding:'10px 18px',borderRadius:20,fontSize:13.5,fontWeight:600,whiteSpace:'nowrap',animation:'fadeIn .2s ease',pointerEvents:'none',maxWidth:320,textAlign:'center'}}>

  );
}

// ─── CHAT THREAD ─────────────────────────────────────────────
function ChatThreadScreen({chatId,sellerId,bookId,back,go,profile,sellers,books,showToast}){
  const [chat,setChat]=React.useState(null);
  const [msgs,setMsgs]=React.useState([]);
  const [draft,setDraft]=React.useState('');
  const [order,setOrder]=React.useState(null);
  const [confirmingDelivery,setConfirmingDelivery]=React.useState(false);
  const scrollRef=React.useRef(null);
  const book=books.find(b=>b.id===bookId)||{title:'Livro',price:0,subject:'',author:''};
  const otherSeller=sellers[sellerId]||{name:'Vendedor',initials:'?',color:200};
  const {buyerPays}=calcFees(book.price);

  const loadMsgs=React.useCallback(async(cid)=>{
    const {data}=await sb.from('messages').select('*').eq('chat_id',cid).order('created_at',{ascending:true});
    setMsgs(data||[]);
  },[]);

  const loadOrder=React.useCallback(async()=>{
    if(!bookId)return;
    const {data}=await sb.from('orders').select('*').eq('book_id',bookId).maybeSingle();
    setOrder(data||null);
  },[bookId]);

  const loadOrCreateChat=React.useCallback(async()=>{
    if(!profile)return;
    if(chatId){
      setChat({id:chatId});
      loadMsgs(chatId);
      loadOrder();
      return;
    }
    const {data:existing}=await sb.from('chats').select('*').eq('book_id',bookId).eq('buyer_id',profile.id).maybeSingle();
    if(existing){
      setChat(existing);
      loadMsgs(existing.id);
      loadOrder();
    } else {
      const {data:newChat,error}=await sb.from('chats').insert({book_id:bookId,buyer_id:profile.id,seller_id:sellerId}).select().single();
      if(error){showToast('Erro ao iniciar chat');return;}
      setChat(newChat);
    }
  },[chatId,bookId,sellerId,profile,loadMsgs,loadOrder,showToast]);

  React.useEffect(()=>{loadOrCreateChat();},[loadOrCreateChat]);

  React.useEffect(()=>{
    if(!chat)return;
    const sub=sb.channel('msgs-'+chat.id)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`chat_id=eq.${chat.id}`},payload=>{
        setMsgs(m=>[...m,payload.new]);
      })
      .subscribe();
    return ()=>sb.removeChannel(sub);
  },[chat]);

  React.useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[msgs]);

  const send=async()=>{
    if(!draft.trim()||!chat||!profile)return;
    const txt=draft.trim();
    setDraft('');
    await sb.from('messages').insert({chat_id:chat.id,sender_id:profile.id,text:txt});
  };

  const confirmDelivery=async()=>{
    if(!order||!profile||confirmingDelivery)return;
    setConfirmingDelivery(true);
    const isBuyer=profile.id===order.buyer_id;
    const update=isBuyer?{buyer_confirmed_delivery:true}:{seller_confirmed_delivery:true};
    const newBuyer=isBuyer?true:order.buyer_confirmed_delivery;
    const newSeller=isBuyer?order.seller_confirmed_delivery:true;
    const bothDone=newBuyer&&newSeller;
    if(bothDone) update.status='completed';
    const {data}=await sb.from('orders').update(update).eq('id',order.id).select().single();
    if(data){
      setOrder(data);
      if(bothDone){
        await sb.from('books').update({status:'sold'}).eq('id',bookId);
        showToast('Entrega confirmada! Negócio concluído');
      } else {
        showToast('Confirmacao registrada, aguardando a outra parte');
      }
    }
    setConfirmingDelivery(false);
  };

  const isBuyer=profile&&order&&profile.id===order.buyer_id;
  const myConfirmed=order&&(isBuyer?order.buyer_confirmed_delivery:order.seller_confirmed_delivery);

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      <div style={{padding:'54px 14px 11px',background:'var(--surface)',boxShadow:'0 1px 0 var(--line)',display:'flex',alignItems:'center',gap:11}}>

function FakeQR({size=160}){
  const N=21,cell=size/N;const cells=[];let seed=7;
  const rnd=()=>(seed=(seed*9301+49297)%233280)/233280;
  const finder=(r,c)=>(r<7&&c<7)||(r<7&&c>=N-7)||(r>=N-7&&c<7);
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){if(finder(r,c))continue;if(rnd()>0.55)cells.push(<rect key={r+'-'+c} x={c*cell} y={r*cell} width={cell} height={cell} rx={cell*0.2} fill="var(--ink)"/>);}
  const Finder=({x,y})=>(<g><rect x={x*cell} y={y*cell} width={cell*7} height={cell*7} rx={cell*1.6} fill="var(--ink)"/><rect x={(x+1)*cell} y={(y+1)*cell} width={cell*5} height={cell*5} rx={cell} fill="#fff"/><rect x={(x+2)*cell} y={(y+2)*cell} width={cell*3} height={cell*3} rx={cell*0.6} fill="var(--ink)"/></g>);
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{cells}<Finder x={0} y={0}/><Finder x={N-7} y={0}/><Finder x={0} y={N-7}/></svg>;
}

  const sellerId = book.seller_id || book.sellerId;

  const copyPix=()=>{
    navigator.clipboard.writeText(PIX_KEY)

            </div>
          </div>
          <button onClick={onLogout} style={{...ICONBTN,background:'#fee2e2'}} title="Sair">
            <Icon name="logout" size={19} color="#b91c1c"/>
          </button>
        </div>

        <div style={{marginTop:18,borderRadius:20,padding:20,color:'#fff',position:'relative',overflow:'hidden',background:'linear-gradient(120deg,oklch(0.42 0.1 248) 0%,var(--green-d) 110%)',boxShadow:'0 12px 26px -14px oklch(0.42 0.1 248 / 0.8)'}}>
          <div style={{position:'absolute',right:-20,top:-20,width:120,height:120,borderRadius:'50%',background:'rgba(255,255,255,0.08)'}}/>
          <div style={{display:'flex',alignItems:'center',gap:7,fontSize:13,fontWeight:600,opacity:0.9}}>
            <Icon name="wallet" size={17} color="#fff"/> Saldo disponível para sacar
          </div>
          <div style={{fontSize:34,fontWeight:800,letterSpacing:-0.5,marginTop:6}}>{fmt(profile.balance||0)}</div>
          <button style={{marginTop:16,height:44,width:'100%',borderRadius:12,border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:800,fontSize:14.5,background:'#fff',color:'var(--green-d)',display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
            <Icon name="bolt" size={17} fill="var(--green-d)" color="var(--green-d)"/> Sacar via Pix
          </button>
        </div>

        <div style={{display:'flex',marginTop:16,padding:'16px 8px',borderRadius:16,background:'var(--surface)',boxShadow:'inset 0 0 0 1.5px var(--line)'}}>
          {[[String(profile.sales||0),'Vendas'],[String(myBooks.filter(b=>b.status==='active').length),'Ativos'],[Number(profile.rating||5).toFixed(1),'Avaliação']].map(([v,l],i,a)=>(
            <React.Fragment key={l}>
              <div style={{flex:1,textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:800,color:'var(--ink)'}}>{v}</div>
                <div style={{fontSize:12,fontWeight:600,color:'var(--muted)',marginTop:2}}>{l}</div>
              </div>
              {i<a.length-1&&<div style={{width:1,background:'var(--line)'}}/>}
            </React.Fragment>
          ))}
        </div>

        <div style={{marginTop:22,display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{fontSize:17,fontWeight:800,color:'var(--ink)'}}>Meus anúncios</div>
          <button onClick={()=>go('sell')} style={{display:'flex',alignItems:'center',gap:4,border:'none',background:'none',cursor:'pointer',fontFamily:'inherit',fontSize:13.5,fontWeight:800,color:'var(--green-d)',padding:0}}>
            <Icon name="plus" size={16}/> Novo
          </button>
        </div>
        {myBooks.length===0&&(
          <div style={{textAlign:'center',padding:'30px 20px',color:'var(--muted)',background:'var(--surface)',borderRadius:16}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--ink)'}}>Nenhum anúncio ainda</div>
            <button onClick={()=>go('sell')} style={{marginTop:10,border:'none',background:'none',cursor:'pointer',fontFamily:'inherit',fontSize:13.5,fontWeight:700,color:'var(--green-d)',padding:0}}>Anunciar agora →</button>
          </div>
        )}
        {myBooks.map(b=>{
          const {sellerReceives}=calcFees(b.price);
          return(
            <div key={b.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 0',borderBottom:'1px solid var(--line)'}}>
              <div style={{width:44,height:44,borderRadius:9,overflow:'hidden',flexShrink:0}}><BookCover book={b} radius={9}/></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:800,color:'var(--ink)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{b.title}</div>
                <div style={{fontSize:12.5,fontWeight:700,color:'var(--green-d)',marginTop:2}}>Você recebe {fmt(sellerReceives)}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                <span style={{fontSize:11.5,fontWeight:800,padding:'4px 10px',borderRadius:999,background:b.status==='active'?'oklch(0.95 0.05 152)':'var(--bg)',color:b.status==='active'?'var(--green-d)':'var(--muted)'}}>{b.status==='active'?'Ativo':'Vendido'}</span>
                <button onClick={()=>deleteBook(b.id)} style={{border:'none',background:'none',cursor:'pointer',padding:0}}><Icon name="trash" size={16} color="var(--muted)"/></button>
              </div>
            </div>
          );
        })}

        <div style={{marginTop:24}}>
          <Button kind="danger" full onClick={onLogout}>
            <Icon name="logout" size={18} color="#b91c1c"/>Sair da conta
          </Button>
        </div>
      </div>
    </div>
  );
}

// ─── BOTTOM NAV ──────────────────────────────────────────────
function BottomNav({current,go}){
  const items=[
    {key:'home',icon:'home',label:'Início'},
    {key:'search',icon:'search',label:'Buscar'},
    {key:'sell',center:true},
    {key:'chat',icon:'chat',label:'Chat'},
    {key:'profile',icon:'user',label:'Perfil'},
  ];
  return(
    <div style={{position:'absolute',bottom:0,left:0,right:0,zIndex:40,background:'var(--surface)',boxShadow:'0 -1px 0 var(--line)',paddingBottom:22,display:'flex',alignItems:'flex-start',justifyContent:'space-around',paddingTop:9}}>
      {items.map(it=>{
        if(it.center)return(
          <button key="sell" onClick={()=>go('sell')} style={{border:'none',cursor:'pointer',background:'none',marginTop:-2,padding:0}}>
            <div style={{width:52,height:52,borderRadius:17,background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 18px -6px var(--green-shadow)'}}>
              <Icon name="plus" size={26} color="#fff" strokeWidth={2.4}/>
            </div>
          </button>
        );
        const active=current===it.key;
        return(
          <button key={it.key} onClick={()=>go(it.key)} style={{border:'none',background:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,width:56,padding:0}}>
            <Icon name={it.icon} size={24} color={active?'var(--green-d)':'var(--muted)'} fill={active?'var(--green)':'none'} strokeWidth={active?0:1.9}/>
            <span style={{fontSize:10.5,fontWeight:700,color:active?'var(--green-d)':'var(--muted)'}}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─── PHONE SHELL WRAPPER ─────────────────────────────────────
function PhoneShell({children,showNav,go,rootTab,toast,setToast}){
  return(
    <div className="phone-outer" style={{width:'100%',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 0',background:'#e8e8ed'}}>
      <div className="phone-shell" style={{width:390,height:844,borderRadius:48,overflow:'hidden',position:'relative',background:'var(--bg)',boxShadow:'0 40px 80px rgba(0,0,0,0.18),0 0 0 1px rgba(0,0,0,0.12)',fontFamily:'-apple-system,system-ui,sans-serif',WebkitFontSmoothing:'antialiased'}}>
        <div className="phone-notch" style={{position:'absolute',top:11,left:'50%',transform:'translateX(-50%)',width:126,height:37,borderRadius:24,background:'#000',zIndex:50}}/>
        <div style={{height:'100%',overflow:'auto',WebkitOverflowScrolling:'touch',paddingBottom:showNav?80:0}}>
          {children}
        </div>
        {showNav&&<BottomNav current={rootTab} go={go}/>}
        <div className="phone-home-bar" style={{position:'absolute',bottom:0,left:0,right:0,zIndex:60,height:34,display:'flex',justifyContent:'center',alignItems:'flex-end',paddingBottom:8,pointerEvents:'none'}}>
          <div style={{width:139,height:5,borderRadius:100,background:'rgba(0,0,0,0.25)'}}/>
        </div>
        {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────
function App(){
  const [appState,setAppState]=React.useState('loading');
  const [authUser,setAuthUser]=React.useState(null);
  const [profile,setProfile]=React.useState(null);
  const [loginError,setLoginError]=React.useState('');
  const [profileSaving,setProfileSaving]=React.useState(false);
  const [books,setBooks]=React.useState([]);
  const [chats,setChats]=React.useState([]);
  const [sellers,setSellers]=React.useState({});
  const [favs,setFavs]=React.useState([]);
  const [stack,setStack]=React.useState([{screen:'home'}]);
  const [toast,setToast]=React.useState('');

  const showToast=React.useCallback((msg)=>{setToast(msg);},[]);
  const go=React.useCallback((screen,params)=>{
    if(TABS.includes(screen)) setStack([{screen,params}]);
    else setStack(s=>[...s,{screen,params}]);
  },[]);
  const back=React.useCallback(()=>setStack(s=>s.length>1?s.slice(0,-1):s),[]);
  const toggleFav=React.useCallback(id=>setFavs(f=>f.includes(id)?f.filter(x=>x!==id):[...f,id]),[]);

  const loadBooks=React.useCallback(async()=>{
    const {data,error}=await sb.from('books').select('*').eq('status','active').order('created_at',{ascending:false});
    if(!error&&data) setBooks(data);
  },[]);

  const loadChats=React.useCallback(async(uid)=>{
    const {data}=await sb.from('chats').select('*').or(`buyer_id.eq.${uid},seller_id.eq.${uid}`).order('created_at',{ascending:false});
    if(data) setChats(data);
  },[]);

  const loadSellers=React.useCallback(async(bookList)=>{
    const ids=[...new Set(bookList.map(b=>b.seller_id).filter(Boolean))];
    if(!ids.length)return;
    const {data}=await sb.from('profiles').select('*').in('id',ids);
    if(data){
      const map={};
      data.forEach(p=>{map[p.id]=p;});
      setSellers(prev=>({...prev,...map}));
    }
  },[]);

  React.useEffect(()=>{
    let realtimeChan=null;

    const handleUser=async(user)=>{
      setAuthUser(user);
      const {data:prof}=await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();
      if(prof&&prof.name){
        setProfile(prof);
        setAppState('app');
        loadBooks();
        loadChats(user.id);
        // realtime books
        realtimeChan=sb.channel('books-rt')
          .on('postgres_changes',{event:'INSERT',schema:'public',table:'books'},payload=>{
            setBooks(prev=>{
              if(prev.find(b=>b.id===payload.new.id)) return prev;
              return [payload.new,...prev];
            });
          })
          .subscribe();
      } else {
        setAppState('register');
      }
    };

    sb.auth.getSession().then(({data:{session}})=>{
      if(session) handleUser(session.user);
      else setAppState('login');
    });

    const {data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(event==='SIGNED_IN'&&session){
        handleUser(session.user);
      } else if(event==='SIGNED_OUT'){
        setAppState('login');
        setAuthUser(null);
        setProfile(null);
        setBooks([]);
        setChats([]);
        if(realtimeChan) sb.removeChannel(realtimeChan);
      }
    });

    return ()=>{
      subscription.unsubscribe();
      if(realtimeChan) sb.removeChannel(realtimeChan);
    };
  },[]);

  React.useEffect(()=>{
    if(books.length>0) loadSellers(books);
  },[books,loadSellers]);

  React.useEffect(()=>{
    if(!chats.length)return;
    const ids=[...new Set([...chats.map(c=>c.buyer_id),...chats.map(c=>c.seller_id)].filter(Boolean))];
    sb.from('profiles').select('*').in('id',ids).then(({data})=>{
      if(data){const map={};data.forEach(p=>{map[p.id]=p;});setSellers(prev=>({...prev,...map}));}
    });
  },[chats]);

  const handleLogin=async()=>{
    setLoginError('');
    const {error}=await sb.auth.signInWithOAuth({
      provider:'google',
      options:{redirectTo:window.location.origin}
    });
    if(error) setLoginError(error.message);
  };

  const handleSaveProfile=async(data)=>{
    if(!authUser)return;
    setProfileSaving(true);
    const {data:prof,error}=await sb.from('profiles').upsert({id:authUser.id,...data}).select().single();
    if(error){showToast('Erro ao salvar perfil: '+error.message);setProfileSaving(false);return;}
    setProfile(prof);
    setAppState('app');
    loadBooks();
    loadChats(authUser.id);
    setProfileSaving(false);
  };

  const handleLogout=async()=>{ await sb.auth.signOut(); };

  const handlePublish=React.useCallback((book)=>{
    setBooks(prev=>{
      if(prev.find(b=>b.id===book.id)) return prev;
      return [book,...prev];
    });
    go('publishSuccess',book);
  },[go]);

  const cur=stack[stack.length-1];
  const rootTab=stack[0].screen;
  const showNav=TABS.includes(cur.screen);

  if(appState==='loading') return(
    <PhoneShell showNav={false} go={go} rootTab={rootTab} toast={toast} setToast={setToast}>
      <LoadingScreen/>
    </PhoneShell>
  );

  if(appState==='login') return(
    <PhoneShell showNav={false} go={go} rootTab={rootTab} toast={toast} setToast={setToast}>
      <LoginScreen onLogin={handleLogin} error={loginError}/>
    </PhoneShell>
  );

  if(appState==='register') return(
    <PhoneShell showNav={false} go={go} rootTab={rootTab} toast={toast} setToast={setToast}>
      <RegisterScreen user={authUser} onSave={handleSaveProfile} loading={profileSaving}/>
    </PhoneShell>
  );

  let screen;
  switch(cur.screen){
    case 'home':
      screen=<HomeScreen go={go} favs={favs} toggleFav={toggleFav} books={books}/>;
      break;
    case 'search':
      screen=<SearchScreen go={go} favs={favs} toggleFav={toggleFav} books={books}/>;
      break;
    case 'chat':
      screen=<ChatListScreen go={go} chats={chats} profile={profile} sellers={sellers} books={books}/>;
      break;
    case 'profile':
      screen=<ProfileScreen go={go} books={books} setBooks={setBooks} profile={profile} onLogout={handleLogout} showToast={showToast}/>;
      break;
    case 'detail':
      screen=<DetailScreen id={cur.params.id} back={back} go={go} favs={favs} toggleFav={toggleFav} books={books} profile={profile} sellers={sellers}/>;
      break;
    case 'sell':
      screen=<SellScreen go={go} onPublish={handlePublish} profile={profile} showToast={showToast}/>;
      break;
    case 'checkout':
      screen=<CheckoutScreen id={cur.params.id} back={back} go={go} books={books} profile={profile} showToast={showToast}/>;
      break;
    case 'chatThread':
      screen=<ChatThreadScreen chatId={cur.params?.chatId} sellerId={cur.params?.sellerId} bookId={cur.params?.bookId} back={back} go={go} profile={profile} sellers={sellers} books={books} showToast={showToast}/>;
      break;
    case 'publishSuccess':{
      const d=cur.params||{};
      const {sellerReceives}=calcFees(d.price||0);
      screen=(
        <div style={{height:'100%',background:'var(--bg)',display:'flex',flexDirection:'column',padding:24,justifyContent:'center'}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',flex:1,justifyContent:'center'}}>
            <div style={{width:88,height:88,borderRadius:'50%',background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 14px 34px -12px var(--green-shadow)',marginBottom:22,animation:'pop .4s cubic-bezier(.2,1.3,.4,1)'}}>
              <Icon name="check" size={44} color="#fff" strokeWidth={3.2}/>
            </div>
            <div style={{fontSize:24,fontWeight:800,color:'var(--ink)',letterSpacing:-0.4}}>Anúncio publicado!</div>
            <div style={{fontSize:14.5,fontWeight:500,color:'var(--muted)',marginTop:10,maxWidth:290,lineHeight:1.5}}>"{d.title}" já está na vitrine.</div>
            <div style={{fontSize:14.5,fontWeight:500,color:'var(--muted)',marginTop:6,maxWidth:290,lineHeight:1.5}}>Quando vender, você recebe <strong style={{color:'var(--green-d)'}}>{fmt(sellerReceives)}</strong> no Pix.</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <Button kind="primary" full size="lg" onClick={()=>go('home')}>Ver na vitrine</Button>
            <Button kind="ghost" full onClick={()=>go('sell')}>Anunciar outro</Button>
          </div>
        </div>
      );
      break;
    }
    default:
      screen=<HomeScreen go={go} favs={favs} toggleFav={toggleFav} books={books}/>;
  }

  return(
    <PhoneShell showNav={showNav} go={go} rootTab={rootTab} toast={toast} setToast={setToast}>
      {screen}
    </PhoneShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function(err) {
      console.warn('SW registration failed:', err);
    });
  });
}
</script>
</body>
