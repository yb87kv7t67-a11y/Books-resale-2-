<!--
-- Run in Supabase SQL editor:
create table profiles (
  id uuid references auth.users primary key,
  name text, school text, address text, whatsapp text,
  initials text, color int default 152,
  rating float default 5.0, sales int default 0, balance float default 0,
  created_at timestamptz default now()
);
create table books (
  id uuid default gen_random_uuid() primary key,
  title text not null, author text default '',
  subject text, year text, school text,
  condition text default 'bom', price float default 0,
  delivery text default 'combinado',
  photo_url text default '',
  seller_id uuid references profiles(id),
  status text default 'active',
  faved_count int default 0,
  created_at timestamptz default now()
);
create table chats (
  id uuid default gen_random_uuid() primary key,
  book_id uuid references books(id),
  buyer_id uuid references profiles(id),
  seller_id uuid references profiles(id),
  created_at timestamptz default now()
);
create table messages (
  id uuid default gen_random_uuid() primary key,
  chat_id uuid references chats(id),
  sender_id uuid references profiles(id),
  text text, created_at timestamptz default now()
);
create table orders (
  id uuid default gen_random_uuid() primary key,
  book_id uuid references books(id),
  buyer_id uuid references profiles(id),
  seller_id uuid references profiles(id),
  status text default 'payment_confirmed',
  buyer_confirmed_delivery boolean default false,
  seller_confirmed_delivery boolean default false,
  created_at timestamptz default now()
);
create table notifications (
  id uuid default gen_random_uuid() primary key,
  type text default 'info',
  user_id uuid references profiles(id),
  order_id uuid references orders(id),
  book_id uuid,
  message text,
  read boolean default false,
  created_at timestamptz default now()
);
alter table profiles add column if not exists status text default 'active';

function calcFees(price){
  const buyerFee=price*FEE_EACH, sellerFee=price*FEE_EACH;
  return {buyerFee,sellerFee,buyerPays:price+buyerFee,sellerReceives:price-sellerFee};

function calcCRC16(str){
  let crc=0xFFFF;
  for(let i=0;i<str.length;i++){
    crc^=str.charCodeAt(i)<<8;
    for(let j=0;j<8;j++){crc=crc&0x8000?(crc<<1)^0x1021:crc<<1;crc&=0xFFFF;}
  }
  return crc;
}
function gerarPix(chave,nome,cidade,valor){
  const f=(id,v)=>id+String(v.length).padStart(2,'0')+v;
  const norm=s=>s.replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9 ]/g,'');
  const gui=f('00','br.gov.bcb.pix')+f('01',chave);
  let payload=f('00','01')+f('26',gui)+f('52','0000')+f('53','986')+f('54',valor.toFixed(2))+f('58','BR')+f('59',norm(nome).substring(0,25))+f('60',norm(cidade).substring(0,15))+f('62',f('05','***'))+'6304';
  return payload+calcCRC16(payload).toString(16).toUpperCase().padStart(4,'0');
}

// ─── CHAT THREAD ─────────────────────────────────────────────
function ChatThreadScreen({chatId,sellerId,bookId,back,go,profile,sellers,books,showToast}){
  const [chat,setChat]=React.useState(null);
  const [msgs,setMsgs]=React.useState([]);
  const [draft,setDraft]=React.useState('');
  const [order,setOrder]=React.useState(null);
  const [confirmingDelivery,setConfirmingDelivery]=React.useState(false);
  const scrollRef=React.useRef(null);
  const book=books.find(b=>b.id===bookId)||{title:'Livro',price:0,subject:'',author:''};
  const otherSeller=sellers[sellerId]||{name:'Vendedor',initials:'?',color:200};
  const {buyerPays}=calcFees(book.price);

  const loadMsgs=React.useCallback(async(cid)=>{
    const {data}=await sb.from('messages').select('*').eq('chat_id',cid).order('created_at',{ascending:true});
    setMsgs(data||[]);
  },[]);

  const loadOrder=React.useCallback(async()=>{
    if(!bookId)return;
    const {data}=await sb.from('orders').select('*').eq('book_id',bookId).maybeSingle();
    setOrder(data||null);
  },[bookId]);

  const loadOrCreateChat=React.useCallback(async()=>{
    if(!profile)return;
    if(chatId){
      setChat({id:chatId});
      loadMsgs(chatId);
      loadOrder();
      return;
    }
    const {data:existing}=await sb.from('chats').select('*').eq('book_id',bookId).eq('buyer_id',profile.id).maybeSingle();
    if(existing){
      setChat(existing);
      loadMsgs(existing.id);
      loadOrder();
    } else {
      const {data:newChat,error}=await sb.from('chats').insert({book_id:bookId,buyer_id:profile.id,seller_id:sellerId}).select().single();
      if(error){showToast('Erro ao iniciar chat');return;}
      setChat(newChat);
    }
  },[chatId,bookId,sellerId,profile,loadMsgs,loadOrder,showToast]);

  React.useEffect(()=>{loadOrCreateChat();},[loadOrCreateChat]);

  React.useEffect(()=>{
    if(!chat)return;
    const sub=sb.channel('msgs-'+chat.id)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`chat_id=eq.${chat.id}`},payload=>{
        setMsgs(m=>[...m,payload.new]);
      })
      .subscribe();
    return ()=>sb.removeChannel(sub);
  },[chat]);

  React.useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[msgs]);

  const send=async()=>{
    if(!draft.trim()||!chat||!profile)return;
    const txt=draft.trim();
    setDraft('');
    await sb.from('messages').insert({chat_id:chat.id,sender_id:profile.id,text:txt});
  };

  const confirmDelivery=async(refused=false)=>{
    if(!order||!profile||confirmingDelivery)return;
    setConfirmingDelivery(true);
    const isBuyer=profile.id===order.buyer_id;
    const role=isBuyer?'comprador':'vendedor';
    if(refused){
      await sb.from('orders').update({status:'disputed'}).eq('id',order.id);
      await sb.from('notifications').insert({
        type:'delivery_refused',user_id:profile.id,order_id:order.id,book_id:bookId,
        message:`${role} ${profile.name} RECUSOU a entrega do livro "${book.title}" (R$ ${book.price}).`
      }).catch(()=>{});
      setOrder(prev=>({...prev,status:'disputed'}));
      showToast('Problema reportado. Entraremos em contato!');
      setConfirmingDelivery(false);
      return;
    }
    const update=isBuyer?{buyer_confirmed_delivery:true}:{seller_confirmed_delivery:true};
    const newBuyer=isBuyer?true:order.buyer_confirmed_delivery;
    const newSeller=isBuyer?order.seller_confirmed_delivery:true;
    const bothDone=newBuyer&&newSeller;
    if(bothDone) update.status='completed';
    const {data}=await sb.from('orders').update(update).eq('id',order.id).select().single();
    if(data){
      setOrder(data);
      await sb.from('notifications').insert({
        type:bothDone?'delivery_completed':'delivery_confirmed',user_id:profile.id,order_id:order.id,book_id:bookId,
        message:bothDone
          ?`Entrega concluída! Livro "${book.title}" – ambas as partes confirmaram.`
          :`${role} ${profile.name} confirmou entrega do livro "${book.title}". Aguardando a outra parte.`
      }).catch(()=>{});
      if(bothDone){
        await sb.from('books').update({status:'sold'}).eq('id',bookId);
        showToast('Entrega confirmada! Negócio concluído');
      } else {
        showToast('Confirmação registrada, aguardando a outra parte');
      }
    }
    setConfirmingDelivery(false);
  };

  const isBuyer=profile&&order&&profile.id===order.buyer_id;
  const myConfirmed=order&&(isBuyer?order.buyer_confirmed_delivery:order.seller_confirmed_delivery);

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)'}}>

        <div style={{flex:1}}>
          <div style={{fontSize:15.5,fontWeight:800,color:'var(--ink)'}}>{otherSeller.name}</div>
        </div>
      </div>
      <button onClick={()=>go('detail',{id:bookId})} style={{display:'flex',alignItems:'center',gap:12,margin:'12px 14px 0',padding:10,borderRadius:14,background:'var(--surface)',boxShadow:'inset 0 0 0 1.5px var(--line)',cursor:'pointer',fontFamily:'inherit',textAlign:'left',border:'none'}}>
        <div style={{width:44,height:44,borderRadius:9,overflow:'hidden',flexShrink:0}}><BookCover book={book} radius={9}/></div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:800,color:'var(--ink)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{book.title}</div>
          <div style={{fontSize:14,fontWeight:800,color:'var(--green-d)'}}>{fmt(buyerPays)}</div>
        </div>
        <Icon name="chevR" size={18} color="var(--muted)"/>
      </button>

      {order&&(
        <div style={{margin:'12px 14px 0',padding:14,borderRadius:14,background:order.status==='completed'?'oklch(0.96 0.04 152)':order.status==='disputed'?'oklch(0.97 0.03 25)':'oklch(0.97 0.03 248)',boxShadow:'inset 0 0 0 1.5px var(--line)'}}>
          <div style={{fontSize:13,fontWeight:800,color:'var(--ink)',marginBottom:6}}>
            {order.status==='completed'?'✅ Compra confirmada!':order.status==='disputed'?'⚠️ Problema reportado':'Confirmar compra'}
          </div>
          {order.status==='disputed'&&<div style={{fontSize:12,fontWeight:500,color:'oklch(0.45 0.12 25)',lineHeight:1.4}}>Nossa equipe vai verificar e entrar em contato em breve.</div>}
          {order.status==='completed'&&<div style={{fontSize:12,fontWeight:500,color:'oklch(0.38 0.1 152)',lineHeight:1.4}}>O pagamento será liberado em até 24h.</div>}
          {order.status!=='completed'&&order.status!=='disputed'&&(
            <>
              <div style={{fontSize:12,fontWeight:500,color:'var(--muted)',marginBottom:10,lineHeight:1.4}}>
                O pagamento será feito até 24h após ambos confirmarem.{'\n'}
                Comprador: {order.buyer_confirmed_delivery?'✓ confirmou':'aguardando'} &nbsp;|&nbsp; Vendedor: {order.seller_confirmed_delivery?'✓ confirmou':'aguardando'}
              </div>
              {!myConfirmed&&(
                <div style={{display:'flex',gap:8}}>
                  <Button kind="danger" size="sm" style={{flex:1}} disabled={confirmingDelivery} onClick={()=>confirmDelivery(true)}>
                    Recusar
                  </Button>
                  <Button kind="primary" size="sm" style={{flex:2}} disabled={confirmingDelivery} onClick={()=>confirmDelivery(false)}>

function FakeQR({size=160}){
  const N=21,cell=size/N;const cells=[];let seed=7;
  const rnd=()=>(seed=(seed*9301+49297)%233280)/233280;
  const finder=(r,c)=>(r<7&&c<7)||(r<7&&c>=N-7)||(r>=N-7&&c<7);
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){if(finder(r,c))continue;if(rnd()>0.55)cells.push(<rect key={r+'-'+c} x={c*cell} y={r*cell} width={cell} height={cell} rx={cell*0.2} fill="var(--ink)"/>);}
  const Finder=({x,y})=>(<g><rect x={x*cell} y={y*cell} width={cell*7} height={cell*7} rx={cell*1.6} fill="var(--ink)"/><rect x={(x+1)*cell} y={(y+1)*cell} width={cell*5} height={cell*5} rx={cell} fill="#fff"/><rect x={(x+2)*cell} y={(y+2)*cell} width={cell*3} height={cell*3} rx={cell*0.6} fill="var(--ink)"/></g>);
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{cells}<Finder x={0} y={0}/><Finder x={N-7} y={0}/><Finder x={0} y={N-7}/></svg>;
}

            <div style={{fontSize:34,fontWeight:800,color:'var(--green-d)',letterSpacing:-0.5}}>{fmt(book.price)}</div>
          </div>
          <div style={{width:'100%',borderRadius:14,background:'oklch(0.97 0.03 152)',padding:'14px 16px'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--green-d)',textTransform:'uppercase',letterSpacing:0.5,marginBottom:6}}>Chave Pix (Celular)</div>
            <div style={{fontSize:18,fontWeight:800,color:'var(--ink)',letterSpacing:0.5,marginBottom:10}}>{PIX_KEY}</div>
            <div style={{fontSize:12,fontWeight:500,color:'var(--muted)',marginBottom:10}}>Nome: PageSell · Banco: Nubank</div>
            <button onClick={copyPix} style={{width:'100%',height:44,borderRadius:12,border:'none',cursor:'pointer',background:copied?'var(--green)':'var(--ink)',color:'#fff',fontFamily:'inherit',fontSize:14,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
              <Icon name={copied?'check':'copy'} size={16} color="#fff"/>{copied?'Chave copiada!':'Copiar chave Pix'}
            </button>
          </div>
          <div style={{fontSize:12.5,fontWeight:500,color:'var(--muted)',textAlign:'center',lineHeight:1.5}}>
            Abra o app do seu banco → Pix → Pagar → Cole a chave
          </div>
        </div>

        <div style={{display:'flex',gap:10,alignItems:'flex-start',padding:'0 4px'}}>
          <Icon name="shield" size={18} color="var(--green)"/>
          <span style={{fontSize:12.5,fontWeight:500,color:'var(--muted)',lineHeight:1.45}}>O pagamento só é liberado ao vendedor quando você confirmar o recebimento do livro.</span>
        </div>
      </div>
      <div style={{padding:'12px 18px 22px',background:'var(--surface)',boxShadow:'0 -1px 0 var(--line)'}}>
        <Button kind="primary" full size="lg" disabled={saving} onClick={confirmPayment}>
          {saving?'Confirmando…':'Já fiz o pagamento'}
        </Button>
      </div>
    </div>
  );
}

function ProfileScreen({go,books,setBooks,profile,onLogout,showToast}){

    const {error}=await sb.from('books').delete().eq('id',bookId);

          <div style={{position:'absolute',right:-20,top:-20,width:120,height:120,borderRadius:'50%',background:'rgba(255,255,255,0.08)'}}/>
          <div style={{display:'flex',alignItems:'center',gap:7,fontSize:13,fontWeight:600,opacity:0.9}}>

          <div style={{fontSize:34,fontWeight:800,letterSpacing:-0.5,marginTop:6}}>{fmt(profile.balance||0)}</div>
          <button style={{marginTop:16,height:44,width:'100%',borderRadius:12,border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:800,fontSize:14.5,background:'#fff',color:'var(--green-d)',display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>

          {[[String(profile.sales||0),'Vendas'],[String(myBooks.filter(b=>b.status==='active').length),'Ativos'],[Number(profile.rating||5).toFixed(1),'Avaliação']].map(([v,l],i,a)=>(
            <React.Fragment key={l}>
              <div style={{flex:1,textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:800,color:'var(--ink)'}}>{v}</div>
                <div style={{fontSize:12,fontWeight:600,color:'var(--muted)',marginTop:2}}>{l}</div>
              </div>
              {i<a.length-1&&<div style={{width:1,background:'var(--line)'}}/>}
            </React.Fragment>
          ))}
        </div>

        <div style={{marginTop:22,display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>

          const {sellerReceives}=calcFees(b.price);
          return(

            <button onClick={()=>go('admin')} style={{width:'100%',height:54,borderRadius:15,border:'none',cursor:'pointer',background:'linear-gradient(135deg,#1e1e2e,#2d2d44)',color:'#a78bfa',fontFamily:'inherit',fontSize:15,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',gap:9,boxShadow:'0 6px 20px -8px rgba(100,60,200,0.5)'}}>
              <Icon name="shield" size={20} color="#a78bfa"/> Painel Admin
            </button>
          </div>
        )}
        <a href="https://instagram.com/thepagesell_" target="_blank" rel="noopener" style={{marginTop:18,display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:'14px 0',borderRadius:16,background:'linear-gradient(120deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)',textDecoration:'none'}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="#fff" stroke="none"/></svg>
          <span style={{color:'#fff',fontWeight:800,fontSize:15}}>@thepagesell_</span>
        </a>
        <div style={{marginTop:18}}>
          <Button kind="danger" full onClick={onLogout}>

        </div>
      </div>

  );
}

// ─── ADMIN SCREEN ────────────────────────────────────────────
function AdminScreen({back,profile,showToast}){
  const [tab,setTab]=React.useState('dashboard');
  const [users,setUsers]=React.useState([]);
  const [allBooks,setAllBooks]=React.useState([]);
  const [orders,setOrders]=React.useState([]);
  const [notifs,setNotifs]=React.useState([]);
  const [loading,setLoading]=React.useState(false);
  const [warnTarget,setWarnTarget]=React.useState(null);
  const [warnMsg,setWarnMsg]=React.useState('');
  const [sendingWarn,setSendingWarn]=React.useState(false);

  const load=React.useCallback(async(t)=>{
    setLoading(true);
    if(t==='dashboard'||t==='users'){
      const {data}=await sb.from('profiles').select('*').order('created_at',{ascending:false});
      setUsers(data||[]);
    }
    if(t==='dashboard'||t==='books'){
      const {data}=await sb.from('books').select('*').order('created_at',{ascending:false});
      setAllBooks(data||[]);
    }
    if(t==='dashboard'||t==='orders'){
      const {data}=await sb.from('orders').select('*').order('created_at',{ascending:false});
      setOrders(data||[]);
    }
    if(t==='notifs'){
      const {data}=await sb.from('notifications').select('*').order('created_at',{ascending:false}).limit(100);
      setNotifs(data||[]);
    }
    setLoading(false);
  },[]);

  React.useEffect(()=>{load(tab);},[tab]);

  const deleteUser=async(uid,uname)=>{
    if(!window.confirm(`Deletar conta de ${uname}? Isso remove o perfil e todos os anúncios.`))return;
    await sb.from('books').delete().eq('seller_id',uid);
    const {error}=await sb.from('profiles').delete().eq('id',uid);
    if(error){showToast('Erro ao deletar: '+error.message);return;}
    setUsers(prev=>prev.filter(u=>u.id!==uid));
    showToast('Conta deletada');
  };

  const suspendUser=async(u)=>{
    const newStatus=u.status==='suspended'?'active':'suspended';
    const {error}=await sb.from('profiles').update({status:newStatus}).eq('id',u.id);
    if(error){showToast('Erro: '+error.message);return;}
    setUsers(prev=>prev.map(x=>x.id===u.id?{...x,status:newStatus}:x));
    showToast(newStatus==='suspended'?`${u.name} suspenso`:`${u.name} reativado`);
  };

  const deleteBook=async(bid)=>{
    const {error}=await sb.from('books').delete().eq('id',bid);
    if(error){showToast('Erro: '+error.message);return;}
    setAllBooks(prev=>prev.filter(b=>b.id!==bid));
    showToast('Anúncio removido');
  };

  const markRead=async(id)=>{
    await sb.from('notifications').update({read:true}).eq('id',id);
    setNotifs(prev=>prev.map(n=>n.id===id?{...n,read:true}:n));
  };

  const sendWarning=async()=>{
    if(!warnTarget||!warnMsg.trim()||sendingWarn)return;
    setSendingWarn(true);
    const {error}=await sb.from('notifications').insert({
      type:'warning',user_id:warnTarget.id,
      message:`[AVISO ADMIN] ${warnMsg.trim()}`
    });
    if(error){showToast('Erro: '+error.message);}else{showToast(`Aviso enviado para ${warnTarget.name}`);}
    setWarnMsg('');setWarnTarget(null);setSendingWarn(false);
  };

  const TABS2=[{k:'dashboard',label:'Painel'},{k:'users',label:'Usuários'},{k:'books',label:'Livros'},{k:'orders',label:'Pedidos'},{k:'notifs',label:'Notificações'}];
  const unread=notifs.filter(n=>!n.read).length;
  const revenue=orders.filter(o=>o.status==='completed').length;
  const activeBooks=allBooks.filter(b=>b.status==='active').length;

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'#0e0e1a',color:'#e2e8f0'}}>
      <div style={{padding:'54px 16px 14px',background:'#1a1a2e',boxShadow:'0 1px 0 rgba(255,255,255,0.07)',display:'flex',alignItems:'center',gap:12}}>
        <button onClick={back} style={{...ICONBTN,background:'rgba(255,255,255,0.08)'}}><Icon name="chevL" size={22} color="#e2e8f0"/></button>
        <div style={{flex:1}}>
          <div style={{fontSize:11,fontWeight:700,color:'#a78bfa',letterSpacing:1,textTransform:'uppercase'}}>Admin</div>
          <div style={{fontSize:18,fontWeight:800,color:'#fff',letterSpacing:-0.3}}>Painel de Controle</div>
        </div>
        <button onClick={()=>load(tab)} style={{...ICONBTN,background:'rgba(255,255,255,0.08)'}}><Icon name="bolt" size={18} color="#a78bfa"/></button>
      </div>

      <div style={{display:'flex',gap:6,padding:'10px 14px',overflowX:'auto',scrollbarWidth:'none',background:'#1a1a2e',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
        {TABS2.map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)} style={{flexShrink:0,height:32,padding:'0 14px',borderRadius:999,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:12.5,fontWeight:700,background:tab===t.k?'#7c3aed':'rgba(255,255,255,0.08)',color:tab===t.k?'#fff':'#94a3b8',position:'relative'}}>
            {t.label}{t.k==='notifs'&&unread>0&&<span style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',background:'#ef4444',fontSize:9,fontWeight:800,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{unread}</span>}
          </button>
        ))}
      </div>

      {loading&&<div style={{padding:40,textAlign:'center',color:'#64748b',fontSize:13}}>Carregando…</div>}

      {!loading&&tab==='dashboard'&&(
        <div style={{flex:1,overflow:'auto',padding:16,display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[
              {label:'Usuários',value:users.length,icon:'user',color:'#7c3aed'},
              {label:'Livros ativos',value:activeBooks,icon:'tag',color:'#0891b2'},
              {label:'Pedidos totais',value:orders.length,icon:'wallet',color:'#059669'},
              {label:'Concluídos',value:revenue,icon:'check',color:'#d97706'},
            ].map(s=>(
              <div key={s.label} style={{borderRadius:16,padding:16,background:'#1a1a2e',boxShadow:'inset 0 0 0 1px rgba(255,255,255,0.07)'}}>
                <div style={{width:36,height:36,borderRadius:10,background:s.color+'22',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:10}}>
                  <Icon name={s.icon} size={18} color={s.color}/>
                </div>
                <div style={{fontSize:28,fontWeight:800,color:'#fff',letterSpacing:-0.5}}>{s.value}</div>
                <div style={{fontSize:12,fontWeight:600,color:'#64748b',marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{borderRadius:16,padding:16,background:'#1a1a2e',boxShadow:'inset 0 0 0 1px rgba(255,255,255,0.07)'}}>
            <div style={{fontSize:12,fontWeight:700,color:'#64748b',letterSpacing:0.5,marginBottom:10,textTransform:'uppercase'}}>Últimas notificações</div>
            {notifs.slice(0,5).map(n=>(
              <div key={n.id} style={{fontSize:12.5,fontWeight:500,color:n.read?'#475569':'#e2e8f0',padding:'7px 0',borderBottom:'1px solid rgba(255,255,255,0.05)',lineHeight:1.4}}>{n.message}</div>
            ))}
            {notifs.length===0&&<div style={{fontSize:13,color:'#475569'}}>Nenhuma notificação ainda</div>}
          </div>
        </div>
      )}

      {!loading&&tab==='users'&&(
        <div style={{flex:1,overflow:'auto',padding:'8px 14px'}}>
          {users.map(u=>(
            <div key={u.id} style={{padding:'12px 0',borderBottom:'1px solid rgba(255,255,255,0.06)',display:'flex',alignItems:'center',gap:11}}>
              <div style={{width:40,height:40,borderRadius:'50%',background:`oklch(0.35 0.08 ${u.color||152})`,color:`oklch(0.8 0.12 ${u.color||152})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,flexShrink:0}}>{u.initials||'?'}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:800,color:'#e2e8f0',display:'flex',alignItems:'center',gap:6}}>
                  {u.name}
                  {u.status==='suspended'&&<span style={{fontSize:10,fontWeight:800,padding:'2px 6px',borderRadius:999,background:'rgba(239,68,68,0.15)',color:'#f87171'}}>SUSPENSO</span>}
                </div>
                <div style={{fontSize:11.5,fontWeight:500,color:'#64748b',marginTop:1}}>{u.school} · {u.address}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>setWarnTarget(u)} style={{height:30,padding:'0 10px',borderRadius:8,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:11.5,fontWeight:700,background:'rgba(251,191,36,0.12)',color:'#fbbf24'}}>Aviso</button>
                <button onClick={()=>suspendUser(u)} style={{height:30,padding:'0 10px',borderRadius:8,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:11.5,fontWeight:700,background:u.status==='suspended'?'rgba(16,185,129,0.12)':'rgba(168,85,247,0.12)',color:u.status==='suspended'?'#34d399':'#c084fc'}}>
                  {u.status==='suspended'?'Reativar':'Suspender'}
                </button>
                <button onClick={()=>deleteUser(u.id,u.name)} style={{height:30,width:30,borderRadius:8,border:'none',cursor:'pointer',background:'rgba(239,68,68,0.12)',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>
                  <Icon name="trash" size={14} color="#f87171"/>
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {!loading&&tab==='books'&&(
        <div style={{flex:1,overflow:'auto',padding:'8px 14px'}}>
          {allBooks.map(b=>(
            <div key={b.id} style={{padding:'11px 0',borderBottom:'1px solid rgba(255,255,255,0.06)',display:'flex',alignItems:'center',gap:11}}>
              <div style={{width:42,height:42,borderRadius:9,overflow:'hidden',flexShrink:0}}><BookCover book={b} radius={9}/></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13.5,fontWeight:800,color:'#e2e8f0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.title}</div>
                <div style={{fontSize:11.5,fontWeight:500,color:'#64748b'}}>{b.school} · {fmt(b.price)} · <span style={{color:b.status==='active'?'#34d399':'#94a3b8'}}>{b.status}</span></div>
              </div>
              <button onClick={()=>deleteBook(b.id)} style={{height:30,width:30,borderRadius:8,border:'none',cursor:'pointer',background:'rgba(239,68,68,0.12)',display:'flex',alignItems:'center',justifyContent:'center',padding:0,flexShrink:0}}>
                <Icon name="trash" size={14} color="#f87171"/>
              </button>
            </div>
          ))}
        </div>
      )}

      {!loading&&tab==='orders'&&(
        <div style={{flex:1,overflow:'auto',padding:'8px 14px'}}>
          {orders.length===0&&<div style={{padding:'40px 0',textAlign:'center',fontSize:13,color:'#475569'}}>Nenhum pedido ainda</div>}
          {orders.map(o=>(
            <div key={o.id} style={{padding:'12px 0',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:600,color:'#64748b'}}>{new Date(o.created_at).toLocaleDateString('pt-BR')}</span>
                <span style={{fontSize:11,fontWeight:800,padding:'3px 8px',borderRadius:999,background:o.status==='completed'?'rgba(16,185,129,0.15)':o.status==='disputed'?'rgba(239,68,68,0.15)':'rgba(168,85,247,0.15)',color:o.status==='completed'?'#34d399':o.status==='disputed'?'#f87171':'#c084fc'}}>
                  {o.status==='completed'?'Concluído':o.status==='disputed'?'Problema':o.status==='payment_confirmed'?'Pago':'Em andamento'}
                </span>
              </div>
              <div style={{fontSize:12,fontWeight:500,color:'#94a3b8'}}>
                Comprador confirmou: {o.buyer_confirmed_delivery?'✓':'–'} &nbsp;|&nbsp; Vendedor confirmou: {o.seller_confirmed_delivery?'✓':'–'}
              </div>
            </div>
          ))}
        </div>
      )}

      {!loading&&tab==='notifs'&&(
        <div style={{flex:1,overflow:'auto',padding:'8px 14px'}}>
          {notifs.length===0&&<div style={{padding:'40px 0',textAlign:'center',fontSize:13,color:'#475569'}}>Nenhuma notificação</div>}
          {notifs.map(n=>(
            <div key={n.id} style={{padding:'12px 0',borderBottom:'1px solid rgba(255,255,255,0.06)',opacity:n.read?0.5:1}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                    <span style={{fontSize:10.5,fontWeight:800,padding:'2px 7px',borderRadius:999,background:n.type==='delivery_refused'?'rgba(239,68,68,0.15)':n.type==='warning'?'rgba(251,191,36,0.15)':'rgba(16,185,129,0.15)',color:n.type==='delivery_refused'?'#f87171':n.type==='warning'?'#fbbf24':'#34d399'}}>
                      {n.type==='delivery_refused'?'RECUSA':n.type==='delivery_completed'?'CONCLUÍDO':n.type==='warning'?'AVISO':'INFO'}
                    </span>
                    <span style={{fontSize:11,color:'#475569'}}>{new Date(n.created_at).toLocaleDateString('pt-BR')}</span>
                  </div>
                  <div style={{fontSize:13,fontWeight:500,color:'#e2e8f0',lineHeight:1.4}}>{n.message}</div>
                </div>
                {!n.read&&<button onClick={()=>markRead(n.id)} style={{flexShrink:0,height:26,padding:'0 10px',borderRadius:7,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:11,fontWeight:700,background:'rgba(124,58,237,0.2)',color:'#a78bfa'}}>OK</button>}
              </div>
            </div>
          ))}
        </div>
      )}

      {warnTarget&&(
        <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'flex-end',zIndex:50}}>
          <div style={{width:'100%',background:'#1a1a2e',borderRadius:'20px 20px 0 0',padding:'24px 18px 36px'}}>
            <div style={{fontSize:16,fontWeight:800,color:'#e2e8f0',marginBottom:4}}>Enviar aviso para {warnTarget.name}</div>
            <div style={{fontSize:13,fontWeight:500,color:'#64748b',marginBottom:16}}>O aviso ficará registrado nas notificações do sistema.</div>
            <textarea value={warnMsg} onChange={e=>setWarnMsg(e.target.value)} placeholder="Mensagem de aviso…" style={{width:'100%',height:100,borderRadius:13,border:'none',boxShadow:'inset 0 0 0 1.5px rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.05)',padding:'12px 14px',fontSize:14,fontFamily:'inherit',fontWeight:500,color:'#e2e8f0',outline:'none',resize:'none'}}/>
            <div style={{display:'flex',gap:10,marginTop:14}}>
              <button onClick={()=>{setWarnTarget(null);setWarnMsg('');}} style={{flex:1,height:48,borderRadius:13,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:14,fontWeight:700,background:'rgba(255,255,255,0.07)',color:'#94a3b8'}}>Cancelar</button>
              <button onClick={sendWarning} disabled={sendingWarn||!warnMsg.trim()} style={{flex:2,height:48,borderRadius:13,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:14,fontWeight:700,background:'#7c3aed',color:'#fff',opacity:sendingWarn||!warnMsg.trim()?0.5:1}}>{sendingWarn?'Enviando…':'Enviar aviso'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── BOTTOM NAV ──────────────────────────────────────────────
// ─── ORDERS SCREEN ───────────────────────────────────────────
function OrdersScreen({go,profile,books}){
  const [orders,setOrders]=React.useState([]);
  const [loading,setLoading]=React.useState(true);

  React.useEffect(()=>{
    if(!profile)return;
    sb.from('orders').select('*').eq('buyer_id',profile.id).order('created_at',{ascending:false})
      .then(({data})=>{setOrders(data||[]);setLoading(false);});
  },[profile]);

  const statusLabel={payment_confirmed:'Aguardando confirmação',completed:'Concluído',disputed:'Em disputa'};
  const statusColor={payment_confirmed:'oklch(0.97 0.03 248)',completed:'oklch(0.96 0.04 152)',disputed:'oklch(0.97 0.03 25)'};
  const statusTextColor={payment_confirmed:'oklch(0.38 0.1 248)',completed:'oklch(0.38 0.1 152)',disputed:'oklch(0.45 0.12 25)'};

  return(
    <div style={{background:'var(--bg)',minHeight:'100%'}}>
      <div style={{padding:'58px 18px 16px',background:'var(--surface)',boxShadow:'0 1px 0 var(--line)'}}>
        <div style={{fontSize:12,fontWeight:700,color:'var(--green-d)',letterSpacing:1,textTransform:'uppercase',marginBottom:2}}>PageSell</div>
        <div style={{fontSize:26,fontWeight:800,color:'var(--ink)',letterSpacing:-0.7}}>Meus Pedidos</div>
      </div>
      <div style={{padding:16}}>
        {loading&&<div style={{textAlign:'center',padding:40,color:'var(--muted)',fontSize:14}}>Carregando…</div>}
        {!loading&&orders.length===0&&(
          <div style={{textAlign:'center',padding:'56px 20px',color:'var(--muted)'}}>
            <div style={{width:64,height:64,borderRadius:20,background:'var(--surface)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}><Icon name="wallet" size={28} color="var(--muted)"/></div>
            <div style={{fontSize:16,fontWeight:800,color:'var(--ink)',marginBottom:6}}>Nenhum pedido ainda</div>
            <div style={{fontSize:13}}>Quando comprar um livro, aparece aqui</div>
          </div>
        )}
        {orders.map(o=>{
          const book=books.find(b=>b.id===o.book_id)||{title:'Livro',price:0,subject:''};
          const st=o.status||'payment_confirmed';
          return(
            <div key={o.id} onClick={()=>go('chatThread',{bookId:o.book_id,sellerId:o.seller_id})}
              style={{borderRadius:16,background:'var(--surface)',boxShadow:'0 1px 2px rgba(0,0,0,0.04),0 4px 16px rgba(0,0,0,0.06)',marginBottom:12,padding:14,cursor:'pointer',display:'flex',gap:13,alignItems:'center'}}>
              <div style={{width:52,height:52,borderRadius:11,overflow:'hidden',flexShrink:0}}><BookCover book={book} radius={11}/></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14.5,fontWeight:800,color:'var(--ink)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{book.title}</div>
                <div style={{fontSize:12,fontWeight:600,color:'var(--muted)',marginBottom:6}}>{book.subject}</div>
                <span style={{display:'inline-block',padding:'3px 10px',borderRadius:999,fontSize:11.5,fontWeight:700,background:statusColor[st],color:statusTextColor[st]}}>
                  {statusLabel[st]||st}
                </span>
              </div>
              <div style={{fontSize:15,fontWeight:800,color:'var(--green-d)',flexShrink:0}}>{fmt(book.price)}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BottomNav({current,go,unread=0,onChatOpen}){
  const items=[
    {key:'home',icon:'home',label:'Início'},
    {key:'search',icon:'search',label:'Buscar'},
    {key:'sell',center:true},
    {key:'chat',icon:'chat',label:'Chat'},
    {key:'orders',icon:'wallet',label:'Pedidos'},
    {key:'profile',icon:'user',label:'Perfil'},
  ];
  return(
    <div style={{position:'absolute',bottom:0,left:0,right:0,zIndex:40,background:'rgba(255,255,255,0.88)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',boxShadow:'0 -1px 0 rgba(0,0,0,0.06)',paddingBottom:22,display:'flex',alignItems:'flex-start',justifyContent:'space-around',paddingTop:9}}>
      {items.map(it=>{
        if(it.center)return(
          <button key="sell" onClick={()=>go('sell')} style={{border:'none',cursor:'pointer',background:'none',marginTop:-2,padding:0}}>
            <div style={{width:52,height:52,borderRadius:17,background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 18px -6px var(--green-shadow)'}}>
              <Icon name="plus" size={26} color="#fff" strokeWidth={2.4}/>
            </div>
          </button>
        );
        const active=current===it.key;
        return(
          <button key={it.key} onClick={()=>{go(it.key);if(it.key==='chat'&&onChatOpen)onChatOpen();}} style={{border:'none',background:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,width:56,padding:0,position:'relative'}}>
            <Icon name={it.icon} size={24} color={active?'var(--green-d)':'var(--muted)'} fill={active?'var(--green)':'none'} strokeWidth={active?0:1.9}/>
            {it.key==='chat'&&unread>0&&<span style={{position:'absolute',top:-2,right:8,minWidth:16,height:16,borderRadius:999,background:'#ef4444',fontSize:9.5,fontWeight:800,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>{unread>9?'9+':unread}</span>}
            <span style={{fontSize:10.5,fontWeight:700,color:active?'var(--green-d)':'var(--muted)'}}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─── PHONE SHELL WRAPPER ─────────────────────────────────────
function PhoneShell({children,showNav,go,rootTab,toast,setToast,unread,onChatOpen}){
  return(
    <div className="phone-outer" style={{width:'100%',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 0',background:'#e8e8ed'}}>
      <div className="phone-shell" style={{width:390,height:844,borderRadius:48,overflow:'hidden',position:'relative',background:'var(--bg)',boxShadow:'0 40px 80px rgba(0,0,0,0.18),0 0 0 1px rgba(0,0,0,0.12)',fontFamily:'-apple-system,system-ui,sans-serif',WebkitFontSmoothing:'antialiased'}}>
        <div className="phone-notch" style={{position:'absolute',top:11,left:'50%',transform:'translateX(-50%)',width:126,height:37,borderRadius:24,background:'#000',zIndex:50}}/>
        <div style={{height:'100%',overflow:'auto',WebkitOverflowScrolling:'touch',paddingBottom:showNav?80:0}}>
          {children}
        </div>
        {showNav&&<BottomNav current={rootTab} go={go} unread={unread} onChatOpen={onChatOpen}/>}
        <div className="phone-home-bar" style={{position:'absolute',bottom:0,left:0,right:0,zIndex:60,height:34,display:'flex',justifyContent:'center',alignItems:'flex-end',paddingBottom:8,pointerEvents:'none'}}>
          <div style={{width:139,height:5,borderRadius:100,background:'rgba(0,0,0,0.25)'}}/>
        </div>
        {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────
function App(){
  const [appState,setAppState]=React.useState('loading');
  const [authUser,setAuthUser]=React.useState(null);
  const [profile,setProfile]=React.useState(null);
  const [loginError,setLoginError]=React.useState('');
  const [profileSaving,setProfileSaving]=React.useState(false);
  const [books,setBooks]=React.useState([]);
  const [chats,setChats]=React.useState([]);
  const [sellers,setSellers]=React.useState({});
  const [favs,setFavs]=React.useState([]);
  const [stack,setStack]=React.useState([{screen:'home'}]);
  const [toast,setToast]=React.useState('');
  const [unreadMsgs,setUnreadMsgs]=React.useState(0);

  const pushNotif=React.useCallback((title,body)=>{
    try{
      if(!('Notification' in window)||Notification.permission!=='granted')return;
      new Notification(title,{body,icon:'/icon.svg'});
    }catch(e){}
  },[]);

  const showToast=React.useCallback((msg)=>{setToast(msg);},[]);
  const go=React.useCallback((screen,params)=>{
    if(TABS.includes(screen)) setStack([{screen,params}]);
    else setStack(s=>[...s,{screen,params}]);
  },[]);
  const back=React.useCallback(()=>setStack(s=>s.length>1?s.slice(0,-1):s),[]);
  const toggleFav=React.useCallback(id=>setFavs(f=>f.includes(id)?f.filter(x=>x!==id):[...f,id]),[]);

  const loadBooks=React.useCallback(async()=>{
    const {data,error}=await sb.from('books').select('*').eq('status','active').order('created_at',{ascending:false});
    if(!error&&data) setBooks(data);
  },[]);

  const loadChats=React.useCallback(async(uid)=>{
    const {data}=await sb.from('chats').select('*').or(`buyer_id.eq.${uid},seller_id.eq.${uid}`).order('created_at',{ascending:false});
    if(data) setChats(data);
  },[]);

  const loadSellers=React.useCallback(async(bookList)=>{
    const ids=[...new Set(bookList.map(b=>b.seller_id).filter(Boolean))];
    if(!ids.length)return;
    const {data}=await sb.from('profiles').select('*').in('id',ids);
    if(data){
      const map={};
      data.forEach(p=>{map[p.id]=p;});
      setSellers(prev=>({...prev,...map}));
    }
  },[]);

  React.useEffect(()=>{
    let realtimeChan=null;
    let started=false;

    const goApp=async(user)=>{
      if(started)return; started=true;
      setAuthUser(user);
      const {data:prof}=await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();
      if(prof&&prof.name){
        setProfile(prof);
        setAppState('app');
        loadBooks(); loadChats(user.id);
        setTimeout(async()=>{
          try{
            if('Notification' in window && Notification.permission==='default'){
              await Notification.requestPermission();
            }
            const {data:uc}=await sb.from('chats').select('id').or(`buyer_id.eq.${user.id},seller_id.eq.${user.id}`);
            const chatIds=(uc||[]).map(c=>c.id);
            if(chatIds.length>0){
              sb.channel('notif-msgs-'+user.id)
                .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},pl=>{
                  const msg=pl.new;
                  if(!chatIds.includes(msg.chat_id)||msg.sender_id===user.id)return;
                  pushNotif('Nova mensagem no PageSell',msg.text?.substring(0,80)||'...');
                  setUnreadMsgs(n=>n+1);
                }).subscribe();
            }
          }catch(e){}
        },1500);
        realtimeChan=sb.channel('books-rt')
          .on('postgres_changes',{event:'INSERT',schema:'public',table:'books'},pl=>{
            setBooks(prev=>prev.find(b=>b.id===pl.new.id)?prev:[pl.new,...prev]);
          }).subscribe();
      } else { setAppState('register'); }
    };

    const boot=async()=>{
      // Step 1: check existing session
      const {data:{session:s0}}=await sb.auth.getSession();
      if(s0?.user){ goApp(s0.user); return; }

      // Step 2: manually parse hash — bypasses iOS Safari detection bugs
      const raw=window.location.hash.replace('#','');
      const p=new URLSearchParams(raw);
      const at=p.get('access_token');
      const rt=p.get('refresh_token');
      if(at){
        // Clean URL before anything else
        try{history.replaceState(null,'',location.pathname+location.search);}catch(_){}
        const {data:sd,error:se}=await sb.auth.setSession({access_token:at,refresh_token:rt||''});
        if(sd?.session?.user){ goApp(sd.session.user); return; }
      }

      // Step 3: no session found — show login
      setAppState('login');
    };

    boot();

    // Listen for sign-in (from signInWithIdToken) and sign-out
    const {data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(event==='SIGNED_IN'&&session&&!started){
        goApp(session.user);
      } else if(event==='SIGNED_OUT'){
        started=false;
        setAppState('login');
        setAuthUser(null);setProfile(null);setBooks([]);setChats([]);
        if(realtimeChan)sb.removeChannel(realtimeChan);
      }
    });

    return ()=>{
      subscription.unsubscribe();
      if(realtimeChan)sb.removeChannel(realtimeChan);
    };
  },[]);

  React.useEffect(()=>{
    if(books.length>0) loadSellers(books);
  },[books,loadSellers]);

  React.useEffect(()=>{
    if(!chats.length)return;
    const ids=[...new Set([...chats.map(c=>c.buyer_id),...chats.map(c=>c.seller_id)].filter(Boolean))];
    sb.from('profiles').select('*').in('id',ids).then(({data})=>{
      if(data){const map={};data.forEach(p=>{map[p.id]=p;});setSellers(prev=>({...prev,...map}));}
    });
  },[chats]);

  const handleLogin=()=>{setLoginError('');};

  const handleSaveProfile=async(data)=>{
    if(!authUser)return;
    setProfileSaving(true);
    const {data:prof,error}=await sb.from('profiles').upsert({id:authUser.id,...data}).select().single();
    if(error){showToast('Erro ao salvar perfil: '+error.message);setProfileSaving(false);return;}
    window.location.replace(window.location.origin);
  };

  const handleLogout=async()=>{ await sb.auth.signOut(); };

  const handlePublish=React.useCallback((book)=>{
    setBooks(prev=>{
      if(prev.find(b=>b.id===book.id)) return prev;
      return [book,...prev];
    });
    go('publishSuccess',book);
  },[go]);

  const cur=stack[stack.length-1];
  const rootTab=stack[0].screen;
  const showNav=TABS.includes(cur.screen);

  if(appState==='loading') return(
    <PhoneShell showNav={false} go={go} rootTab={rootTab} toast={toast} setToast={setToast}>
      <LoadingScreen/>
    </PhoneShell>
  );

  if(appState==='login') return(
    <PhoneShell showNav={false} go={go} rootTab={rootTab} toast={toast} setToast={setToast}>
      <LoginScreen onLogin={handleLogin} error={loginError}/>
    </PhoneShell>
  );

  if(appState==='register') return(
    <PhoneShell showNav={false} go={go} rootTab={rootTab} toast={toast} setToast={setToast}>
      <RegisterScreen user={authUser} onSave={handleSaveProfile} loading={profileSaving}/>
    </PhoneShell>
  );

  let screen;
  switch(cur.screen){
    case 'home':
      screen=<HomeScreen go={go} favs={favs} toggleFav={toggleFav} books={books}/>;
      break;
    case 'search':
      screen=<SearchScreen go={go} favs={favs} toggleFav={toggleFav} books={books}/>;
      break;
    case 'chat':
      screen=<ChatListScreen go={go} chats={chats} profile={profile} sellers={sellers} books={books}/>;
      break;
    case 'orders':
      screen=<OrdersScreen go={go} profile={profile} books={books}/>;
      break;
    case 'profile':
      screen=<ProfileScreen go={go} books={books} setBooks={setBooks} profile={{...profile,email:authUser?.email}} onLogout={handleLogout} showToast={showToast}/>;
      break;
    case 'detail':
      screen=<DetailScreen id={cur.params.id} back={back} go={go} favs={favs} toggleFav={toggleFav} books={books} profile={profile} sellers={sellers}/>;
      break;
    case 'sell':
      screen=<SellScreen go={go} onPublish={handlePublish} profile={profile} showToast={showToast}/>;
      break;
    case 'checkout':
      screen=<CheckoutScreen id={cur.params.id} back={back} go={go} books={books} profile={profile} showToast={showToast}/>;
      break;
    case 'chatThread':
      screen=<ChatThreadScreen chatId={cur.params?.chatId} sellerId={cur.params?.sellerId} bookId={cur.params?.bookId} back={back} go={go} profile={profile} sellers={sellers} books={books} showToast={showToast}/>;
      break;
    case 'admin':
      screen=<AdminScreen back={back} profile={{...profile,email:authUser?.email}} showToast={showToast}/>;
      break;
    case 'publishSuccess':{
      const d=cur.params||{};
      const {sellerReceives}=calcFees(d.price||0);
      screen=(
        <div style={{height:'100%',background:'var(--bg)',display:'flex',flexDirection:'column',padding:24,justifyContent:'center'}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',flex:1,justifyContent:'center'}}>
            <div style={{width:88,height:88,borderRadius:'50%',background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 14px 34px -12px var(--green-shadow)',marginBottom:22,animation:'pop .4s cubic-bezier(.2,1.3,.4,1)'}}>
              <Icon name="check" size={44} color="#fff" strokeWidth={3.2}/>
            </div>
            <div style={{fontSize:24,fontWeight:800,color:'var(--ink)',letterSpacing:-0.4}}>Anúncio publicado!</div>
            <div style={{fontSize:14.5,fontWeight:500,color:'var(--muted)',marginTop:10,maxWidth:290,lineHeight:1.5}}>"{d.title}" já está na vitrine.</div>
            <div style={{fontSize:14.5,fontWeight:500,color:'var(--muted)',marginTop:6,maxWidth:290,lineHeight:1.5}}>Quando vender, você recebe <strong style={{color:'var(--green-d)'}}>{fmt(sellerReceives)}</strong> no Pix.</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <Button kind="primary" full size="lg" onClick={()=>go('home')}>Ver na vitrine</Button>
            <Button kind="ghost" full onClick={()=>go('sell')}>Anunciar outro</Button>
          </div>
        </div>
      );
      break;
    }
    default:
      screen=<HomeScreen go={go} favs={favs} toggleFav={toggleFav} books={books}/>;
  }

  return(
    <PhoneShell showNav={showNav} go={go} rootTab={rootTab} toast={toast} setToast={setToast} unread={unreadMsgs} onChatOpen={()=>setUnreadMsgs(0)}>
      {screen}
    </PhoneShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function(err) {
      console.warn('SW registration failed:', err);
    });
  });
}
</script>
